<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İletişim</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f4f6f9;
margin:0;
}

header{
background:#0F172A;
color:white;
padding:20px;
text-align:center;
}

.container{
width:90%;
max-width:900px;
margin:auto;
padding:30px;
background:white;
margin-top:20px;
border-radius:15px;
}

input,textarea{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:8px;
}

button{
background:#2563EB;
color:white;
border:none;
padding:12px 20px;
border-radius:8px;
cursor:pointer;
}

.back-btn{
display:inline-block;
margin-top:20px;
background:#2563EB;
color:white;
padding:12px 20px;
text-decoration:none;
border-radius:10px;
}

</style>
</head>

<body>

<header>
<h2>Ülkeden Haberler</h2>
</header>

<div class="container">

<h1>İletişim</h1>

<input type="text" placeholder="Adınız">

<input type="email" placeholder="E-posta Adresiniz">

<textarea rows="5" placeholder="Mesajınız"></textarea>

<button>Gönder</button>

<br><br>

<a href="index.html" class="back-btn">
Ana Sayfaya Dön
</a>

</div>
<form>

<input
type="text"
placeholder="Ad Soyad"
required>

<br><br>

<input
type="email"
placeholder="E-Posta Adresiniz"
required>

<br><br>

<textarea
rows="6"
placeholder="Mesajınızı yazın"
required>
</textarea>

<br><br>

<button type="submit">

Mesaj Gönder

</button>

</form>
</body>
</html>
